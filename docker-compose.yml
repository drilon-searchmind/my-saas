# docker-compose.yml
services:
    postgres:
        image: postgres:17
        container_name: my-saas-postgres
        restart: unless-stopped
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: my_saas
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 10s
            timeout: 5s
            retries: 5

    neon-proxy:
        image: ghcr.io/timowilhelm/local-neon-http-proxy:main
        container_name: my-saas-neon-proxy
        restart: unless-stopped
        environment:
            - PG_CONNECTION_STRING=postgresql://neondb_owner:npg_h3kNlWxVA7pJ@ep-falling-shape-al78tb8y.c-3.eu-central-1.aws.neon.tech/neondb?sslmode=require
        ports:
            - "4444:4444"
        depends_on:
            postgres:
                condition: service_healthy

volumes:
    postgres_data:
